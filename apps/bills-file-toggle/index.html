<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Xero – Bill Details</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --white: #FFFFFF;
    --blue: #0078C8;
    --blue-hover: #006BB3;
    --nav-bg: #13243A;
    --text-std: #000A1E;
    --text-muted: #404756;
    --text-link: #0078C8;
    --grey3: #E6E7E9;
    --grey5: #A6A9B0;
    --grey6: #CCCED2;
    --grey8: rgba(0,10,30,0.05);
    --border-shadow: rgba(0,10,30,0.2);
    --negative: #DC3246;
    --font: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }
  body { font-family: var(--font); background: #F0F1F2; overflow: hidden; height: 100vh; }
  button { font-family: var(--font); }
  input { font-family: var(--font); }

  /* NAV */
  .nav { background: var(--nav-bg); height: 64px; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; flex-shrink: 0; }
  .nav-brand { color: #00B7E2; font-weight: 700; font-size: 22px; letter-spacing: 2px; }
  .nav-org { display: flex; align-items: center; gap: 4; margin-left: 16; background: rgba(255,255,255,0.12); border-radius: 4px; padding: 6px 12px; cursor: pointer; }
  .nav-org span { color: white; font-size: 13px; font-weight: 700; }
  .nav-items { display: flex; align-items: center; gap: 0; }
  .nav-item { color: white; font-size: 13px; padding: 8px 12px; cursor: pointer; text-decoration: none; border-bottom: 2px solid transparent; line-height: 20px; }
  .nav-item.active { font-weight: 700; border-bottom-color: white; }
  .nav-right { display: flex; align-items: center; gap: 4; }
  .nav-icon-btn { background: transparent; border: none; cursor: pointer; padding: 8px; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: white; }
  .nav-avatar { width: 32px; height: 32px; border-radius: 50%; background: #5B4FC7; display: flex; align-items: center; justify-content: center; cursor: pointer; color: white; font-size: 12px; font-weight: 700; }

  /* HEADER */
  .header { background: var(--white); padding: 8px 20px; display: flex; justify-content: space-between; align-items: flex-end; box-shadow: 0 1px 0 0 var(--border-shadow); flex-shrink: 0; min-height: 74px; }
  .header-left { display: flex; flex-direction: column; gap: 10px; }
  .breadcrumbs { display: flex; align-items: center; gap: 8px; }
  .breadcrumbs a { font-size: 13px; color: var(--text-link); text-decoration: none; cursor: pointer; }
  .breadcrumbs a:hover { text-decoration: underline; }
  .bc-sep { font-size: 8px; color: var(--grey5); transform: rotate(-90deg); display: inline-block; }
  .title-row { display: flex; align-items: center; gap: 15px; }
  .title-row h1 { font-size: 17px; font-weight: 700; color: var(--text-std); line-height: 28px; }
  .tag { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px; background: var(--grey3); color: var(--text-muted); line-height: 16px; }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .btn-outline { border: 1px solid var(--grey5); border-radius: 3px; background: var(--white); font-weight: 700; font-size: 13px; color: var(--text-std); padding: 6px 12px; cursor: pointer; height: 32px; line-height: 20px; }
  .btn-outline:hover { background: #F5F5F5; }
  .btn-files { display: flex; align-items: center; gap: 6px; border: 1px solid var(--grey5); border-radius: 3px; padding: 6px 12px; background: var(--white); cursor: pointer; height: 32px; transition: background 0.15s; }
  .btn-files.active { background: #E8F4FD; border-color: var(--blue); }
  .btn-files span.label { font-weight: 700; font-size: 13px; color: var(--text-link); }
  .btn-primary-group { display: flex; border-radius: 3px; overflow: hidden; }
  .btn-primary { background: var(--blue); border: none; color: white; font-weight: 700; font-size: 13px; padding: 6px 12px; cursor: pointer; height: 32px; }
  .btn-primary:hover { background: var(--blue-hover); }
  .btn-primary-caret { background: var(--blue); border: none; border-left: 1px solid rgba(255,255,255,0.3); color: white; width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .btn-primary-caret:hover { background: var(--blue-hover); }
  .icon-btn { background: transparent; border: none; cursor: pointer; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 3px; }
  .icon-btn:hover { background: rgba(0,0,0,0.05); }

  /* LAYOUT */
  .main-area { flex: 1; display: flex; overflow: hidden; position: relative; }
  .side-toggle { width: 40px; background: var(--white); border-top: 1px solid var(--grey6); border-right: 1px solid var(--grey6); cursor: pointer; display: flex; flex-direction: column; align-items: center; padding-top: 20px; flex-shrink: 0; }
  .side-toggle:hover { background: #F5F5F5; }

  /* FILE PREVIEW */
  .file-preview { width: 576px; flex-shrink: 0; background: #F5F5F5; display: flex; flex-direction: column; border-top: 1px solid var(--grey6); border-right: 1px solid var(--grey6); overflow: hidden; }
  .fp-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; background: var(--white); border-bottom: 1px solid var(--grey6); height: 56px; flex-shrink: 0; }
  .fp-header-left { display: flex; align-items: center; gap: 12px; }
  .fp-header-right { display: flex; align-items: center; gap: 8px; }
  .fp-filename { font-size: 15px; color: var(--text-std); }
  .btn-download { display: flex; align-items: center; gap: 6px; background: transparent; border: 1px solid var(--grey5); border-radius: 3px; padding: 4px 12px; cursor: pointer; height: 32px; }
  .btn-download span { font-weight: 700; font-size: 13px; color: var(--text-link); }
  .fp-toolbar { display: flex; align-items: center; gap: 2px; padding: 6px 12px; background: var(--white); border-bottom: 1px solid var(--grey6); flex-shrink: 0; flex-wrap: wrap; }
  .tb { background: transparent; border: none; cursor: pointer; padding: 6px; display: flex; align-items: center; justify-content: center; border-radius: 3px; }
  .tb:hover { background: rgba(0,0,0,0.06); }
  .tb-text { font-size: 12px; color: var(--text-muted); padding: 0 4px; min-width: 20px; text-align: center; }
  .fp-body { flex: 1; display: flex; align-items: flex-start; justify-content: center; overflow: auto; padding: 16px; }
  .pdf-page { width: 90%; background: var(--white); border-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.12); padding: 32px; }
  .fp-footer { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 12px 16px; background: var(--white); border-top: 1px solid var(--grey6); flex-shrink: 0; }
  .fp-footer a { font-size: 13px; color: var(--text-link); cursor: pointer; text-decoration: none; }
  .fp-nav-btn { background: transparent; border: none; cursor: pointer; display: flex; padding: 4px; }
  .fp-nav-btn:hover svg path, .fp-nav-btn:hover svg line { stroke: var(--blue-hover); }

  /* CONTENT AREA */
  .content-scroll { flex: 1; overflow: auto; padding: 20px; }
  .content-card { background: var(--white); padding: 20px; }

  /* FORM FIELDS */
  .form-grid { display: flex; flex-wrap: wrap; gap: 12px; }
  .field { flex: 1 0 0; min-width: 180px; }
  .field-label { font-weight: 700; font-size: 13px; color: var(--text-muted); line-height: 20px; margin-bottom: 4px; }
  .field-input { background: var(--white); border: 1px solid var(--grey5); border-radius: 3px; height: 32px; display: flex; align-items: center; width: 100%; overflow: hidden; }
  .field-icon { width: 32px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .field-input input, .field-input .field-text { font-size: 13px; color: var(--text-std); border: none; outline: none; background: transparent; flex: 1; padding: 0 8px; line-height: 20px; height: 100%; }
  .field-input .field-text { display: flex; align-items: center; }
  .field-clear { background: transparent; border: none; cursor: pointer; padding: 4px 6px; display: flex; opacity: 0.5; }
  .field-clear:hover { opacity: 1; }
  .field-caret { width: 32px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

  /* TABLE */
  .lig { border: 1px solid var(--grey6); border-radius: 3px; overflow: hidden; margin-top: 20px; }
  .lig-header { display: flex; }
  .lig-hcell { background: var(--grey8); height: 40px; font-weight: 700; font-size: 13px; color: var(--text-muted); padding: 10px 16px; line-height: 20px; }
  .lig-row { display: flex; }
  .lig-cell { height: 40px; border-bottom: 1px solid var(--grey6); border-right: 1px solid var(--grey6); }
  .lig-cell:last-child { border-right: none; }
  .lig-cell input { width: 100%; height: 100%; border: none; outline: none; font-size: 15px; color: var(--text-std); padding: 8px 16px; line-height: 24px; background: transparent; }
  .lig-cell input:focus { background: #FAFBFC; }
  .lig-cell.right input { text-align: right; }
  .lig-cell.trash-cell { display: flex; align-items: center; justify-content: center; }
  .lig-footer { padding: 3px 0; }
  .btn-add-row { background: transparent; border: none; font-weight: 700; font-size: 13px; color: var(--text-link); cursor: pointer; padding: 6px 12px; }
  .btn-add-row:hover { text-decoration: underline; }

  /* BUTTONS + SUMMARY */
  .btns-summary { display: flex; justify-content: space-between; align-items: flex-start; margin-top: 20px; }
  .action-buttons { display: flex; gap: 10px; align-items: center; }
  .btn-show-cols { background: transparent; border: 1px solid var(--blue); border-radius: 3px; font-weight: 700; font-size: 13px; color: var(--text-link); cursor: pointer; padding: 6px 12px; height: 32px; }
  .btn-show-cols:hover { background: #E8F4FD; }
  .btn-hubdoc { background: transparent; border: none; font-weight: 700; font-size: 13px; color: var(--text-link); cursor: pointer; padding: 6px 12px; height: 32px; display: flex; align-items: center; gap: 8px; }
  .btn-hubdoc:hover { text-decoration: underline; }
  .amount-summary { width: 432px; padding: 0 16px; }
  .summary-line { display: flex; justify-content: space-between; padding: 8px 0; font-size: 15px; color: var(--text-std); line-height: 24px; }
  .summary-divider { padding-top: 4px; }
  .summary-divider div { background: var(--grey5); height: 3px; }
  .summary-total { display: flex; justify-content: space-between; align-items: center; padding-top: 8px; font-weight: 700; font-size: 21px; color: var(--text-std); line-height: 32px; }

  /* HISTORY */
  .history { margin-top: 20px; }
  .history-header { display: flex; justify-content: space-between; align-items: center; height: 56px; }
  .history-toggle { display: flex; align-items: center; gap: 12px; cursor: pointer; user-select: none; }
  .history-toggle:hover { opacity: 0.8; }
  .history-title { font-weight: 700; font-size: 15px; color: var(--text-std); }
  .btn-add-note { border: 1px solid var(--grey5); border-radius: 3px; background: var(--white); font-weight: 700; font-size: 13px; color: var(--text-link); padding: 6px 12px; cursor: pointer; height: 32px; }
  .btn-add-note:hover { background: #F5F5F5; }
  .history-body { padding: 12px 0; font-size: 13px; color: var(--text-muted); border-top: 1px solid var(--grey6); }

  /* PDF Mock Content */
  .pdf-right { text-align: right; font-size: 10px; color: var(--text-muted); }
  .pdf-bold { font-weight: 700; }
  .pdf-title { font-size: 14px; font-weight: 700; color: var(--text-std); margin-top: 16px; }
  .pdf-sub { font-size: 9px; color: var(--text-muted); }
  .pdf-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; }
  .pdf-sm { font-size: 9px; color: var(--text-muted); margin: 2px 0; }
  .pdf-sm-bold { font-size: 9px; font-weight: 700; color: var(--text-std); }
  .pdf-highlight { margin-top: 20px; padding: 8px 12px; background: #FFF8E0; border: 1px solid #E6D464; border-radius: 3px; font-size: 10px; font-weight: 700; color: var(--text-std); display: flex; justify-content: space-between; }
  .pdf-chart { display: flex; align-items: flex-end; gap: 6px; height: 80px; margin-top: 8px; }
  .pdf-bar { width: 20px; border-radius: 2px 2px 0 0; }
  .pdf-section-title { font-size: 10px; font-weight: 700; color: var(--text-std); margin: 20px 0 8px; }
  .pdf-question { margin-top: 12px; padding: 8px; background: #E8F4FD; border-radius: 3px; }
  .pdf-question-title { font-size: 9px; font-weight: 700; color: var(--blue); }
  .pdf-question-text { font-size: 8px; color: var(--text-muted); margin-top: 2px; }

  /* Panel animated wrappers — display:flex so children stretch to full height */
  .preview-wrapper { flex-shrink: 0; overflow: hidden; display: flex; }
  .toggle-wrapper  { flex-shrink: 0; overflow: hidden; display: flex; }
</style>
</head>

/* APP */
const OPEN_EASING  = 'cubic-bezier(0.22, 1, 0.36, 1)';
const CLOSE_EASING = 'cubic-bezier(0.55, 0, 1, 0.45)';

/*
  Three panel states so the opening path never carries a stale transform:
    'idle'    — panel hidden, NO transform property on the element
    'open'    — panel visible, pure width expansion (no transform = no kick/bounce)
    'closing' — panel animating shut, translateX slides it left as width collapses
*/
function App() {
  const [panelState, setPanelState] = useState('idle');
  const timerRef = useRef(null);

  const handleOpen = () => {
    if (timerRef.current) clearTimeout(timerRef.current);
    setPanelState('open');
  };

  const handleClose = () => {
    setPanelState('closing');
    timerRef.current = setTimeout(() => setPanelState('idle'), 220);
  };

  const isOpen    = panelState === 'open';
  const isClosing = panelState === 'closing';
  const isVisible = isOpen || isClosing;

  // Preview panel: idle has NO transform so nothing stale exists when open starts
  const previewStyle = isClosing ? {
    width: 0,
    transform: 'translateX(-40px)',
    transition: `width 200ms ${CLOSE_EASING}, transform 200ms ${CLOSE_EASING}`,
  } : isOpen ? {
    width: 576,
    transform: 'translateX(0)',
    transition: `width 300ms ${OPEN_EASING}`,
  } : {
    width: 0,
    // deliberately no transform here — clean slate for next open
  };

  // Toggle: collapses when panel opens, reappears as panel closes
  const toggleStyle = isVisible ? {
    width: isClosing ? 40 : 0,
    transition: isClosing
      ? `width 220ms ${OPEN_EASING}`
      : `width 150ms ${CLOSE_EASING}`,
  } : {
    width: 40,
  };

  return (
    <div style={{height:"100vh",display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <Nav />
      <Header filesOpen={isVisible} />
      <div className="main-area">
        <div className="toggle-wrapper" style={toggleStyle}>
          <SideToggle onClick={handleOpen} />
        </div>

        <div className="preview-wrapper" style={previewStyle}>
          <FilePreview onClose={handleClose} />
        </div>

        <div className="content-scroll">
          <div className="content-card">
            <Metadata compact={isVisible} />
            <LineItems compact={isVisible} />
            <div style={{marginTop:20}}><Summary /></div>
            <History />
          </div>
        </div>
      </div>
      <div style={{textAlign:'center', padding:'10px 20px', flexShrink:0}}>
        <span style={{fontSize:11, color:'var(--grey5)'}}>Last updated: Apr 21, 2026 @2:00PM EDT</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
