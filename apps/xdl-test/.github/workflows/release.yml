name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.2.0)"
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build templates and CLI
        run: pnpm --filter create-xdl-components build

      - name: Commit updated templates if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/create-xdl-components/templates/
          git add packages/create-xdl-components/dist/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: build for v${{ inputs.version }} [skip ci]"
            git push
          fi

      - name: Create tag and release
        run: |
          git tag "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

          echo "## What's Changed" > notes.md
          echo "" >> notes.md
          echo "### Usage" >> notes.md
          echo '```bash' >> notes.md
          echo "pnpm dlx github:xero-internal-actions-poc/xdl-components#v${{ inputs.version }} my-project" >> notes.md
          echo '```' >> notes.md

          gh release create "v${{ inputs.version }}" \
            --title "v${{ inputs.version }}" \
            --notes-file notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
