name: Build Templates

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "packages/create-xdl-components/scripts/**"
      - "package.json"
      - "postcss.config.mjs"
      - "tsconfig.json"
      - "next.config.ts"
      - "eslint.config.mjs"
      - "components.json"

jobs:
  build-templates:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build templates
        run: pnpm --filter create-xdl-components build-templates

      - name: Commit updated templates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/create-xdl-components/templates/
          if git diff --cached --quiet; then
            echo "No template changes to commit"
          else
            git commit -m "chore: regenerate templates from src [skip ci]"
            git push
          fi
