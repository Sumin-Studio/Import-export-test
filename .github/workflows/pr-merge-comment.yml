name: PR Merge Comment

on:
  pull_request:
    types: [closed]

permissions:
  pull-requests: write

jobs:
  comment:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Comment on merged PR
        uses: actions/github-script@v7
        with:
          retries: 3
          script: |
            const merger = context.payload.pull_request.merged_by.login;
            const sha = context.payload.pull_request.merge_commit_sha.substring(0, 7);
            const marker = '<!-- merge-deploy-comment -->';

            const body = [
              marker,
              `@${merger} merged this PR (commit \`${sha}\`).`,
              '',
              '**Issues? Need to revert?**',
              'Click the \'Revert\' button in this PR to create a revert PR, then merge it to redeploy the previous version.',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
