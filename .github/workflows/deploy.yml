name: Deploy Apps

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'apps.json'
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Folder name of the app to deploy (e.g. ai-monetization)'
        required: true
        type: string

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.detect.outputs.apps }}
      has_new_apps: ${{ steps.detect.outputs.has_new_apps }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed and new apps
        id: detect
        run: |
          set -euo pipefail

          # ---------------------------------------------------------------
          # Manual trigger: deploy a single app by name
          # ---------------------------------------------------------------
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            APP="${{ inputs.app_name }}"

            # Validate: app exists in apps.json
            if ! jq -e --arg a "$APP" '.[$a]' apps.json > /dev/null 2>&1; then
              echo "::error::App '$APP' not found in apps.json"
              exit 1
            fi

            # Validate: app is not deleted
            if jq -e --arg a "$APP" '.[$a].tags // [] | index("deleted")' apps.json > /dev/null 2>&1; then
              echo "::error::App '$APP' is tagged as deleted in apps.json"
              exit 1
            fi

            # Validate: app folder exists on disk
            if [ ! -d "apps/$APP" ]; then
              echo "::error::Folder apps/$APP does not exist"
              exit 1
            fi

            APPS_TO_PROCESS=$(jq -nc --arg a "$APP" '[$a]')

            # Check if this is a new app (no vercelProjectId yet)
            HAS_NEW_APP="false"
            if [ "$(jq -r --arg a "$APP" '.[$a].vercelProjectId // "null"' apps.json)" = "null" ]; then
              HAS_NEW_APP="true"
            fi

            echo "has_new_apps=$HAS_NEW_APP" >> "$GITHUB_OUTPUT"
            echo "apps=$(echo "$APPS_TO_PROCESS" | jq -c '.')" >> "$GITHUB_OUTPUT"
            echo "Manual deploy requested for: $APP"
            exit 0
          fi

          # ---------------------------------------------------------------
          # Automatic trigger (push): detect changed and new apps
          # ---------------------------------------------------------------

          # Get apps changed in this push
          CHANGED_APPS=$(git diff --name-only HEAD~1..HEAD -- 'apps/' | \
            grep -oP '^apps/\K[^/]+' | sort -u || true)

          # Get all app folders that exist on disk
          DISK_APPS=""
          if [ -d apps ]; then
            DISK_APPS=$(ls -d apps/*/ 2>/dev/null | sed 's|apps/||;s|/||' | sort -u || true)
          fi

          # Read apps.json to find new apps (vercelProjectId is null) and skip deleted ones
          APPS_TO_PROCESS="[]"
          for app in $CHANGED_APPS $DISK_APPS; do
            # Deduplicate
            if echo "$APPS_TO_PROCESS" | jq -e --arg a "$app" '.[] | select(. == $a)' > /dev/null 2>&1; then
              continue
            fi

            # Check if app exists in apps.json
            if ! jq -e --arg a "$app" '.[$a]' apps.json > /dev/null 2>&1; then
              continue
            fi

            # Skip deleted apps
            if jq -e --arg a "$app" '.[$a].tags // [] | index("deleted")' apps.json > /dev/null 2>&1; then
              continue
            fi

            # Check if folder exists
            if [ ! -d "apps/$app" ]; then
              continue
            fi

            # Check if it's a new app (no vercelProjectId) or a changed app
            IS_NEW=$(jq -r --arg a "$app" '.[$a].vercelProjectId // "null"' apps.json)
            IS_CHANGED="false"
            if echo "$CHANGED_APPS" | grep -qw "$app"; then
              IS_CHANGED="true"
            fi

            if [ "$IS_NEW" = "null" ] || [ "$IS_CHANGED" = "true" ]; then
              APPS_TO_PROCESS=$(echo "$APPS_TO_PROCESS" | jq --arg a "$app" '. + [$a]')
            fi
          done

          # If apps.json changed, ensure design-internal is redeployed
          # (it reads apps.json at build time to render the app index)
          APPS_JSON_CHANGED=$(git diff --name-only HEAD~1..HEAD -- 'apps.json' || true)
          if [ -n "$APPS_JSON_CHANGED" ]; then
            ALREADY_INCLUDED=$(echo "$APPS_TO_PROCESS" | jq -e '.[] | select(. == "design-internal")' > /dev/null 2>&1 && echo "yes" || echo "no")
            IS_DELETED=$(jq -e '."design-internal".tags // [] | index("deleted")' apps.json > /dev/null 2>&1 && echo "yes" || echo "no")
            if [ "$ALREADY_INCLUDED" = "no" ] && [ "$IS_DELETED" = "no" ] && [ -d "apps/design-internal" ]; then
              APPS_TO_PROCESS=$(echo "$APPS_TO_PROCESS" | jq '. + ["design-internal"]')
              echo "Added design-internal to deploy list (apps.json changed)"
            fi
          fi

          # If any app in the list is new (vercelProjectId is null), skip
          # design-internal from THIS run. The redeploy-home job below will
          # deploy it after all matrix deploys finish and apps.json is updated.
          HAS_NEW_APP="false"
          for app in $(echo "$APPS_TO_PROCESS" | jq -r '.[]'); do
            if [ "$(jq -r --arg a "$app" '.[$a].vercelProjectId // "null"' apps.json)" = "null" ]; then
              HAS_NEW_APP="true"
              break
            fi
          done
          if [ "$HAS_NEW_APP" = "true" ]; then
            APPS_TO_PROCESS=$(echo "$APPS_TO_PROCESS" | jq -c '[.[] | select(. != "design-internal")]')
            echo "Skipped design-internal: new app(s) detected; redeploy-home job will handle it"
          fi

          echo "has_new_apps=$HAS_NEW_APP" >> "$GITHUB_OUTPUT"
          echo "apps=$(echo "$APPS_TO_PROCESS" | jq -c '.')" >> "$GITHUB_OUTPUT"
          echo "Apps to deploy: $APPS_TO_PROCESS"

  deploy:
    needs: detect-changes
    if: needs.detect-changes.outputs.apps != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write
    strategy:
      max-parallel: 1
      matrix:
        app: ${{ fromJson(needs.detect-changes.outputs.apps) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check if app needs project creation
        id: check-project
        run: |
          VERCEL_PROJECT_ID=$(jq -r --arg a "${{ matrix.app }}" '.[$a].vercelProjectId // "null"' apps.json)
          echo "project_id=$VERCEL_PROJECT_ID" >> "$GITHUB_OUTPUT"

          if [ "$VERCEL_PROJECT_ID" = "null" ]; then
            echo "is_new=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_new=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Vercel project
        id: create-project
        if: steps.check-project.outputs.is_new == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
        run: |
          set -euo pipefail

          PROJECT_NAME="${{ matrix.app }}-xro"

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.vercel.com/v11/projects?teamId=$VERCEL_TEAM_ID" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"name\": \"$PROJECT_NAME\",
              \"framework\": null
            }")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" -lt 400 ]; then
            PROJECT_ID=$(echo "$BODY" | jq -r '.id')
            echo "project_id=$PROJECT_ID" >> "$GITHUB_OUTPUT"
            echo "project_name=$PROJECT_NAME" >> "$GITHUB_OUTPUT"
            echo "Created Vercel project: $PROJECT_NAME ($PROJECT_ID)"
          else
            # Project may already exist (e.g., created during preview deploy)
            echo "Project creation returned HTTP $HTTP_CODE, checking if project already exists..."

            FETCH_RESPONSE=$(curl -s -w "\n%{http_code}" \
              "https://api.vercel.com/v9/projects/$PROJECT_NAME?teamId=$VERCEL_TEAM_ID" \
              -H "Authorization: Bearer $VERCEL_TOKEN")

            FETCH_HTTP_CODE=$(echo "$FETCH_RESPONSE" | tail -1)
            FETCH_BODY=$(echo "$FETCH_RESPONSE" | sed '$d')

            if [ "$FETCH_HTTP_CODE" -lt 400 ]; then
              PROJECT_ID=$(echo "$FETCH_BODY" | jq -r '.id')
              echo "project_id=$PROJECT_ID" >> "$GITHUB_OUTPUT"
              echo "project_name=$PROJECT_NAME" >> "$GITHUB_OUTPUT"
              echo "Found existing Vercel project: $PROJECT_NAME ($PROJECT_ID)"
            else
              echo "::error::Failed to create or find Vercel project: $BODY"
              exit 1
            fi
          fi

      - name: Set project ID
        id: project
        run: |
          if [ "${{ steps.check-project.outputs.is_new }}" = "true" ]; then
            echo "id=${{ steps.create-project.outputs.project_id }}" >> "$GITHUB_OUTPUT"
          else
            echo "id=${{ steps.check-project.outputs.project_id }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure Access Group membership
        id: access-group
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_ACCESS_GROUP_ID: ${{ secrets.VERCEL_ACCESS_GROUP_ID }}
          VERCEL_PROJECT_ID: ${{ steps.project.outputs.id }}
        run: |
          set -uo pipefail

          # --- Access Group Configuration ---
          ACCESS_GROUP_ROLE="PROJECT_VIEWER"   # Role assigned to projects in the Access Group

          echo "Checking Access Group membership for ${{ matrix.app }}..."

          # Check if project is already in the Access Group
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            "https://api.vercel.com/v1/access-groups/$VERCEL_ACCESS_GROUP_ID/projects?teamId=$VERCEL_TEAM_ID&projectId=$VERCEL_PROJECT_ID" \
            -H "Authorization: Bearer $VERCEL_TOKEN")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          # If already in group, nothing to do
          if [ "$HTTP_CODE" -lt 400 ]; then
            MEMBER_COUNT=$(echo "$BODY" | jq -r '.members | length // 0' 2>/dev/null || echo "0")
            if [ "$MEMBER_COUNT" -gt 0 ]; then
              echo "✅ ${{ matrix.app }} is already in the Access Group"
              echo "failed=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          # Not in group — add it
          echo "Adding ${{ matrix.app }} to Access Group with role $ACCESS_GROUP_ROLE..."

          ADD_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.vercel.com/v1/access-groups/$VERCEL_ACCESS_GROUP_ID/projects?teamId=$VERCEL_TEAM_ID" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"projectId\": \"$VERCEL_PROJECT_ID\", \"role\": \"$ACCESS_GROUP_ROLE\"}")

          ADD_HTTP_CODE=$(echo "$ADD_RESPONSE" | tail -1)
          ADD_BODY=$(echo "$ADD_RESPONSE" | sed '$d')

          # Success: added to group
          if [ "$ADD_HTTP_CODE" -lt 400 ]; then
            echo "✅ ${{ matrix.app }} added to Access Group successfully"
            echo "failed=false" >> "$GITHUB_OUTPUT"
          # Already in group (409 conflict or 400 with "duplicated" message)
          elif [ "$ADD_HTTP_CODE" -eq 409 ] || echo "$ADD_BODY" | grep -qi "duplicated"; then
            echo "✅ ${{ matrix.app }} is already in the Access Group"
            echo "failed=false" >> "$GITHUB_OUTPUT"
          else
            ERROR_MSG=$(echo "$ADD_BODY" | jq -r '.error.message // .message // "Unknown error"' 2>/dev/null || echo "HTTP $ADD_HTTP_CODE")
            echo "::warning::Failed to add ${{ matrix.app }} to Access Group: $ERROR_MSG"
            echo "failed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Link Vercel project
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ steps.project.outputs.id }}
        run: |
          vercel link --yes --token "$VERCEL_TOKEN" --scope "$VERCEL_ORG_ID" --project "$VERCEL_PROJECT_ID" --cwd "apps/${{ matrix.app }}"

      - name: Clear Root Directory setting
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ steps.project.outputs.id }}
        run: |
          # Clear rootDirectory to avoid path doubling when deploying from app folder
          curl -s -X PATCH \
            "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID?teamId=$VERCEL_TEAM_ID" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"rootDirectory": null}'

      - name: Create GitHub Deployment
        id: deployment
        uses: actions/github-script@v7
        with:
          retries: 3
          script: |
            const { data: deployment } = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: `production – ${{ matrix.app }}`,
              auto_merge: false,
              required_contexts: [],
              transient_environment: false,
              production_environment: true,
              description: `Production deploy for ${{ matrix.app }}`,
            });
            core.setOutput('id', deployment.id);

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.id,
              state: 'in_progress',
              description: 'Deploying to Vercel...',
            });

      - name: Copy apps.json for repository-app tagged apps
        # Note: detect-changes also ensures design-internal is redeployed
        # whenever apps.json changes, even if its own files didn't change.
        run: |
          if jq -e --arg a "${{ matrix.app }}" '.[$a].tags // [] | index("repository-app")' apps.json > /dev/null 2>&1; then
            cp apps.json "apps/${{ matrix.app }}/apps.json"
            echo "Copied apps.json into ${{ matrix.app }} for build"
          else
            echo "Skipping: ${{ matrix.app }} does not have repository-app tag"
          fi

      - name: Deploy to Vercel (production)
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ steps.project.outputs.id }}
        run: |
          set -euo pipefail

          OUTPUT=$(vercel deploy \
            --token "$VERCEL_TOKEN" \
            --yes \
            --prod \
            --cwd "apps/${{ matrix.app }}" 2>&1) || {
            echo "::error::Vercel deploy failed with output:"
            echo "$OUTPUT"
            exit 1
          }

          echo "Full output:"
          echo "$OUTPUT"

          DEPLOYMENT_URL=$(echo "$OUTPUT" | grep -oE 'https://[^ ]+\.vercel\.app[^ ]*' | head -1)
          if [ -z "$DEPLOYMENT_URL" ]; then
            echo "::error::Could not extract deployment URL from output"
            exit 1
          fi
          echo "url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $DEPLOYMENT_URL"

      - name: Update GitHub Deployment — success
        if: success()
        uses: actions/github-script@v7
        with:
          retries: 3
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.id }},
              state: 'success',
              environment_url: '${{ steps.deploy.outputs.url }}',
              description: 'Deployed to Vercel',
            });

      - name: Update GitHub Deployment — failure
        if: failure()
        uses: actions/github-script@v7
        with:
          retries: 3
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.id }},
              state: 'failure',
              description: 'Vercel deployment failed',
            });

      - name: Get Vercel project URL
        id: vercel-url
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
        run: |
          set -euo pipefail

          PROJECT_ID="${{ steps.project.outputs.id }}"

          # Fetch project details to get the canonical .vercel.app alias
          RESPONSE=$(curl -s \
            "https://api.vercel.com/v9/projects/$PROJECT_ID?teamId=$VERCEL_TEAM_ID" \
            -H "Authorization: Bearer $VERCEL_TOKEN")

          # Get the first alias that ends with .vercel.app
          VERCEL_URL=$(echo "$RESPONSE" | jq -r '
            (.targets.production.alias // [])[]
            | select(endswith(".vercel.app"))
          ' | head -1)

          # Fallback: use the deployment URL
          if [ -z "$VERCEL_URL" ]; then
            VERCEL_URL="${{ steps.deploy.outputs.url }}"
          fi

          echo "url=$VERCEL_URL" >> "$GITHUB_OUTPUT"
          echo "Vercel URL: $VERCEL_URL"

      - name: Update apps.json
        if: steps.check-project.outputs.is_new == 'true'
        env:
          VERCEL_URL: ${{ steps.vercel-url.outputs.url }}
          PROJECT_ID: ${{ steps.project.outputs.id }}
          APP_NAME: ${{ matrix.app }}
        run: |
          set -euo pipefail

          # Update vercelProjectId and url in apps.json
          jq --arg app "$APP_NAME" \
             --arg pid "$PROJECT_ID" \
             --arg url "$VERCEL_URL" \
             '.[$app].vercelProjectId = $pid | .[$app].url = $url' \
             apps.json > apps.json.tmp && mv apps.json.tmp apps.json

          echo "Updated apps.json for $APP_NAME"
          cat apps.json

      - name: Commit updated apps.json
        if: steps.check-project.outputs.is_new == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps.json
          git diff --cached --quiet && exit 0
          git commit -m "Bot: deploy updated apps.json with Vercel metadata for ${{ matrix.app }}"
          git pull --rebase origin main
          git push origin main

      - name: Warn if Access Group assignment failed
        if: steps.access-group.outputs.failed == 'true'
        run: |
          echo "::warning::⚠️ Failed to add ${{ matrix.app }} to the Vercel Access Group."
          echo "::warning::Ask an admin to manually add the project in the Vercel dashboard → Access Groups."

  # ---------------------------------------------------------------------------
  # Redeploy design-internal after new apps finish deploying
  # ---------------------------------------------------------------------------
  # When new apps are in the batch, design-internal is skipped from the matrix
  # because it needs the updated apps.json (with Vercel metadata). Pushes made
  # with GITHUB_TOKEN don't trigger new workflow runs, so we call the reusable
  # redeploy-home workflow directly.
  # ---------------------------------------------------------------------------
  redeploy-home:
    needs: [detect-changes, deploy]
    if: needs.detect-changes.outputs.has_new_apps == 'true'
    permissions:
      contents: read
      deployments: write
    uses: ./.github/workflows/redeploy-home.yml
    secrets: inherit

  # ---------------------------------------------------------------------------
  # Post deploy results as a comment on the merged PR
  # ---------------------------------------------------------------------------
  # Runs in parallel with redeploy-home. Finds the PR that triggered this push,
  # gathers deployment statuses, and updates the comment left by
  # pr-merge-comment.yml with per-app results.
  # ---------------------------------------------------------------------------
  notify-pr:
    needs: [deploy]
    if: |
      always() &&
      github.event_name == 'push' &&
      needs.deploy.result != 'skipped'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      deployments: read
    steps:
      - name: Update PR comment with deploy status
        uses: actions/github-script@v7
        with:
          retries: 3
          script: |
            const marker = '<!-- merge-deploy-comment -->';
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            // Find merged PR for this commit
            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
            });
            const mergedPr = prs.find(pr => pr.merged_at);
            if (!mergedPr) {
              console.log('No merged PR found for this commit, skipping');
              return;
            }

            // Get deployments for this SHA and their statuses
            const { data: deployments } = await github.rest.repos.listDeployments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
            });

            const results = [];
            for (const dep of deployments) {
              const { data: statuses } = await github.rest.repos.listDeploymentStatuses({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: dep.id,
                per_page: 1,
              });
              const latest = statuses[0];
              if (latest) {
                const env = dep.environment.replace('production – ', '');
                const icon = latest.state === 'success' ? '✅'
                           : latest.state === 'failure' ? '❌' : '⏳';
                const link = latest.environment_url
                  ? ` → ${latest.environment_url}`
                  : '';
                const failLink = latest.state === 'failure'
                  ? ` ([view logs](${runUrl}))`
                  : '';
                results.push(`${icon} **${env}**: ${latest.state}${link}${failLink}`);
              }
            }

            const sha = context.sha.substring(0, 7);
            const deploySection = results.length > 0
              ? results.join('\n')
              : '⚠️ No deployments found for this commit.';

            const deployBlock = [
              `Deployed (commit \`${sha}\`):`,
              deploySection,
            ].join('\n');

            // Find the existing comment left by pr-merge-comment.yml
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: mergedPr.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              const body = existing.body.trimEnd() + '\n\n' + deployBlock;

              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              // Race condition: deploy finished before pr-merge-comment ran
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: mergedPr.number,
                body: `${marker}\n${deployBlock}`,
              });
            }


